name: Upstream Sync Disabled

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      manual-trigger:
        description: 'This will pull the upstream code while preserving your configuration file. Configuration file compatibility is not guaranteed, and you may need to manually update the configuration file after pulling.'
        type: boolean
        required: true
        default: false
      override-token:
        description: '[Optional] Replace the default token with the supplied PAT. Used to resolve `refusing to allow a GitHub App to create or update workflow... `'
        required: false

jobs:
  sync_latest_from_upstream:
    name: Upstream sync is disabled for this fork
    runs-on: ubuntu-latest

    steps:
      - name: Explain disabled workflow
        run: |
          echo "Upstream sync is disabled because this repository now contains local customizations."
          echo "Apply upstream changes manually and review the diff before deployment."
